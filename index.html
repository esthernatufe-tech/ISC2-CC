      {

**Confidentiality** – Protecting information from unauthorized disclosure. Controls include encryption, access controls, data classification, and need-to-know principles.

**Integrity** – Ensuring data is accurate, complete, and has not been altered without authorization. Controls include hashing, digital signatures, version control, and audit logs.

**Availability** – Ensuring authorized users can access systems and data when needed. Controls include redundancy, failover, backups, and disaster recovery plans.

**Non-repudiation** – A related concept ensuring that a party cannot deny sending a message or performing an action. Achieved through digital signatures and audit logs.`

      {
        name: "Authentication, Authorization & Access Control",
        content: `**Authentication** – Verifying the identity of a user or system. Factors:
- Something you know (password, PIN)
- Something you have (smart card, token)
- Something you are (biometrics)
- Multi-Factor Authentication (MFA) uses 2+ factors.

**Authorization** – What an authenticated user is permitted to do. Models include:
- DAC (Discretionary Access Control) – owner controls access
- MAC (Mandatory Access Control) – labels and clearances
- RBAC (Role-Based Access Control) – permissions tied to job roles
- ABAC (Attribute-Based Access Control) – context-aware rules

**Principle of Least Privilege** – Users should have only the minimum access needed.
**Separation of Duties** – No single person has control over an entire critical process.`
      },
      {
        name: "Privacy & Data Protection",
        content: `**PII (Personally Identifiable Information)** – Any data that can identify a specific individual.
**PHI (Protected Health Information)** – Health-related PII under regulations like HIPAA.
**GDPR** – EU regulation requiring consent, data minimization, right to erasure, breach notification within 72 hours.

**Data Lifecycle**: Creation → Storage → Use → Sharing → Archival → Destruction
- Data at rest: encrypted on disk
- Data in transit: encrypted over network (TLS)
- Data in use: hardest to protect

**Data Classification** (government): Top Secret > Secret > Confidential > Unclassified
**Data Classification** (commercial): Confidential > Private > Sensitive > Public`
      },
      {
        name: "Risk Management",
        content: `**Risk** = Threat × Vulnerability × Asset Value

**Risk Terminology:**
- **Threat** – Potential cause of an unwanted incident
- **Vulnerability** – Weakness that can be exploited
- **Risk** – Likelihood × Impact
- **Control/Safeguard** – Measure to reduce risk

**Risk Treatment Options (TAME):**
- **Transfer** – Shift risk to another party (insurance)
- **Accept** – Acknowledge and tolerate the risk
- **Mitigate** – Reduce likelihood or impact
- **Evade/Avoid** – Eliminate the risk by stopping the activity

**Quantitative Risk Analysis:** ALE = SLE × ARO
- SLE (Single Loss Expectancy) = Asset Value × Exposure Factor
- ARO = Annualized Rate of Occurrence
- ALE = Annual Loss Expectancy

**Qualitative Analysis** uses descriptive ratings (High/Medium/Low).`
      },
      {
        name: "Security Governance & Ethics",
        content: `**Governance Hierarchy:**
Policy → Standard → Baseline → Guideline → Procedure

- **Policy** – High-level mandatory rules (e.g., "All data must be encrypted")
- **Standard** – Specific mandatory requirements (e.g., "Use AES-256")
- **Baseline** – Minimum security configurations
- **Guideline** – Recommended (non-mandatory) practices
- **Procedure** – Step-by-step instructions

**Security Frameworks:** NIST CSF, ISO 27001, CIS Controls, COBIT

**ISC2 Code of Ethics Canons** (in order of priority):
1. Protect society, the common good, necessary public trust and confidence
2. Act honorably, honestly, justly, responsibly, and legally
3. Provide diligent and competent service to principals
4. Advance and protect the profession`
      }
    ],
    questions: [
      {
        q: "An organization wants to ensure that no single administrator can both create user accounts AND assign permissions. Which security principle does this implement?",
        options: ["Least privilege", "Separation of duties", "Defense in depth", "Need to know"],

        explanation: "Separation of duties ensures that no single person controls an entire sensitive process, reducing insider threat risk. Least privilege limits what a single user can do, but separation of duties splits tasks between multiple people."
      },
      {
        q: "Which component of the CIA triad is MOST directly impacted by a ransomware attack that encrypts files?",

      {
        q: "A company's annual loss expectancy (ALE) for a specific risk is $50,000. A control costing $70,000/year would reduce the ALE to $10,000. What should the organization do?",

        answer: 1,
        explanation: "Cost-benefit analysis: the control costs $70,000/year but only saves $40,000/year ($50,000 - $10,000). Since the control cost exceeds the benefit, it is not cost-effective. The organization should look for less expensive controls or consider risk transfer."
      },
      {
        q: "Which data classification label would be applied to information that could cause exceptionally grave damage to national security if disclosed?",

      },
      {
        q: "According to the ISC2 Code of Ethics, what is the FIRST priority?",
        options: ["Act honorably and honestly", "Protect society and the common good", "Provide diligent service to employers", "Advance and protect the profession"],

        explanation: "The ISC2 Code of Ethics canons are listed in priority order. The first canon — protecting society, the common good, and public trust — takes precedence over duties to employers or the profession when conflicts arise."
      },
      {
        q: "A user logs into a system with a username and password, and then the system determines what resources they can access. What are these two actions called?",
        options: ["Identification and Authentication", "Authentication and Authorization", "Authorization and Accountability", "Identification and Non-repudiation"],
        answer: 1,
        explanation: "Authentication verifies WHO the user is (proving identity with credentials). Authorization determines WHAT that authenticated user is allowed to do. These are sequential steps: authenticate first, then authorize."
      },
      {
        q: "A hospital encrypts patient records on its database server, requires VPN for remote staff access, and maintains redundant power and clustered database servers. Which combination of CIA triad elements is being addressed by encryption and VPN, and clustering respectively?",
        options: ["Integrity, Availability, Confidentiality", "Confidentiality, Confidentiality, Availability", "Availability, Integrity, Confidentiality", "Confidentiality, Integrity, Availability"],
        answer: 1,
        explanation: "Both encryption at rest and VPN access primarily protect Confidentiality (preventing unauthorized disclosure of data in storage and in transit). Clustering/redundant servers address Availability (uptime). None of these three controls primarily addresses Integrity, which would need hashing or digital signatures."
      },
      {
        q: "A risk assessment determines a server has a 10% Annualized Rate of Occurrence (ARO) for a specific compromise, with a Single Loss Expectancy (SLE) of $200,000. What is the Annualized Loss Expectancy (ALE)?",
        options: ["$2,000", "$20,000", "$200,000", "$2,000,000"],
        answer: 1,
        explanation: "ALE = SLE × ARO = $200,000 × 0.10 = $20,000. This is the expected yearly loss from this risk and is used to justify whether a proposed control's annual cost is worth the risk reduction it provides."
      },
      {
        q: "An organization's policy states 'all remote access must use multi-factor authentication.' A department later writes a document specifying that remote access MFA must use a hardware token, not SMS codes. What is this second document called?",
        options: ["Guideline", "Procedure", "Standard", "Baseline"],
        answer: 2,
        explanation: "A standard provides specific mandatory technical requirements that support a higher-level policy. Specifying exactly which MFA mechanism is required (hardware token, not SMS) is a precise mandatory requirement — the hallmark of a standard, not a recommendation (guideline) or step-by-step instructions (procedure)."
      },
      {
        q: "Which of the following BEST describes the concept of 'due diligence' in a security governance context?",

        answer: 1,
        explanation: "Due diligence refers to the research, investigation, and understanding of risk BEFORE action is taken — essentially 'doing your homework.' Due CARE, by contrast, refers to the actions taken in response to that knowledge (implementing reasonable protections). The exam frequently tests this distinction."
      },
      {
        q: "A security officer is evaluating a newly identified risk. The cost of mitigation exceeds the asset's value, and the organization decides to continue operating without additional controls, formally acknowledging potential loss. Which risk treatment was selected?",
        options: ["Risk avoidance", "Risk transfer", "Risk acceptance", "Risk mitigation"],
        answer: 2,
        explanation: "Risk acceptance means the organization knowingly tolerates a risk, typically because the cost of treating it exceeds the potential loss, or the risk is within acceptable tolerance. No additional control is implemented, and the organization formally acknowledges the exposure."
      },
      {
        q: "Which statement BEST distinguishes a security policy from a security procedure?",
        options: ["A policy is technical and detailed; a procedure is broad and conceptual", "A policy states what must be done and why; a procedure states the specific steps to do it", "Policies are optional; procedures are mandatory", "Procedures apply to executives; policies apply to staff"],
        answer: 1,
        explanation: "A policy is a high-level statement of management intent — what must happen and why (e.g., 'all sensitive data must be encrypted'). A procedure provides the specific, sequential steps to accomplish that policy's intent (e.g., exact commands/settings to apply encryption)."
      },
      {
        q: "An organization's data classification scheme labels information as Public, Internal, Confidential, and Restricted. A spreadsheet contains customer financial details and would cause significant harm to the company and customers if disclosed. How should this data MOST likely be classified?",
        options: ["Public", "Internal", "Confidential", "Restricted"],
        answer: 3,
        explanation: "Data whose unauthorized disclosure would cause significant or severe harm typically receives the highest classification level available in the scheme (here, Restricted), which mandates the strictest handling controls — encryption, limited access, and audit logging."
      },
      {
        q: "Which scenario is the BEST example of a violation of the 'non-repudiation' security principle?",
        options: ["An employee successfully denies sending a digitally signed contract despite cryptographic evidence proving otherwise", "An attacker reads an unencrypted email in transit", "A user's account is locked after failed login attempts", "A backup fails to restore correctly after a disaster"],
        answer: 0,
        explanation: "Non-repudiation ensures a party cannot credibly deny having performed an action (like signing a document), typically enforced through digital signatures and audit trails. If someone successfully denies an action despite strong cryptographic proof, the goal of non-repudiation has been undermined or improperly implemented."
      },
      {
        q: "A security awareness program teaches employees to recognize that 'urgency, authority, and fear' are commonly used psychological tactics in attacks. This training is MOST relevant to defending against which threat category?",

        answer: 1,
        explanation: "Social engineering relies on psychological manipulation — exploiting urgency, authority, fear, or trust — to trick victims into bypassing normal security judgment (e.g., clicking links, transferring funds, revealing credentials). Technical attacks like SQLi or DDoS do not rely on these human-factor techniques."
      },
      {
        q: "A company assesses a particular risk as 'high likelihood, high impact' using descriptive ratings rather than dollar figures. What type of risk analysis is being performed?",
        options: ["Quantitative risk analysis", "Qualitative risk analysis", "Residual risk analysis", "Control gap analysis"],
        answer: 1,
        explanation: "Qualitative risk analysis uses descriptive, relative ratings (High/Medium/Low or similar scales) rather than precise financial figures. Quantitative analysis instead assigns numeric/monetary values (like ALE, SLE) to enable cost-benefit comparisons."
      },
      {
        q: "Which of the following is the BEST example of the 'least privilege' principle being correctly applied?",
        options: ["A help desk technician is granted full domain administrator rights to simplify password resets", "A junior accountant's account has read/write access to only the accounts payable system needed for their role", "All employees share one elevated account for convenience during audits", "A contractor retains system access for six months after their contract ends, in case it's needed again"],
        answer: 1,
        explanation: "Least privilege means granting only the minimum access necessary to perform job functions — nothing more. Limiting the accountant to exactly the system(s) their role requires is the correct application. Granting broad admin rights for convenience, or retaining unnecessary access, both violate the principle."
      },
      {
        q: "An organization is deciding between two controls: Control A costs $15,000/year and reduces ALE from $40,000 to $30,000. Control B costs $8,000/year and reduces ALE from $40,000 to $33,000. From a pure cost-benefit standpoint, which is the better choice?",
        options: ["Control A, because it reduces risk more in absolute terms", "Control B, because its net loss is smaller", "Neither — both controls cost more than the benefit they provide", "Control A, because higher cost always implies higher quality"],
        answer: 2,
        explanation: "Control A: benefit = $10,000 saved, cost = $15,000 → net loss of $5,000/year. Control B: benefit = $7,000 saved, cost = $8,000 → net loss of $1,000/year. Both controls cost more than the risk reduction they provide, so neither is cost-justified as designed; the organization should seek cheaper alternatives."
      },
      {
        q: "Which of the following best reflects the ISC2 Code of Ethics canon 'provide diligent and competent service to principals'?",
        options: ["Reporting a colleague's unethical behavior to authorities", "Only accepting projects within one's actual area of expertise and keeping skills current", "Refusing to work overtime even during a security incident", "Publicly criticizing a competitor's security practices"],
        answer: 1,
        explanation: "Providing diligent and competent service means practitioners should only take on work they are qualified for, perform it with care, and keep their knowledge current — ensuring 'principals' (employers, clients) receive competent service. This canon is about professional competence and diligence, ranked third after society and personal conduct."
      },
      {
        q: "A vulnerability has a LOW likelihood of being exploited but, if exploited, would cause catastrophic, business-ending impact. How should this risk generally be prioritized?",
        options: ["Ignored, since likelihood is low", "Still treated seriously, since impact severity can outweigh low likelihood", "Automatically transferred via insurance regardless of cost", "Deferred until likelihood increases"],
        answer: 1,
        explanation: "Risk = Likelihood × Impact, but a catastrophic impact (e.g., business-ending) often warrants serious attention even at low likelihood, because the consequence is unacceptable if it occurs. Many organizations apply special handling to 'low probability/high consequence' risks rather than dismissing them due to low likelihood alone."
      },
      {
        q: "Which of these is the clearest example of 'security through obscurity' as a (weak) standalone control?",

      },
      {

// ============== STATE (in-memory only; no localStorage in artifacts) ==============
let state = {
  view: "home",            // home | domain | mock
  activeDomainId: null,
  activeTopic: 0,
  quizMode: false,
  qIndex: 0,
  selected: null,
  showExplanation: false,
  progress: {},             // { "d1_q0": "correct" | "wrong" }
  mockQuestions: [],
  mockIndex: 0,
  mockAnswers: [],
  mockDone: false,
  mockSelected: null,
  mockSecondsLeft: 0,
  mockTimerId: null,
  mockTimeUp: false,
  aiLoading: false,
  aiQuestion: null,
  aiSelected: null,
  aiShowExp: false,
  aiUsedIndices: {}         // { domainId: Set of used extra-pool indices }
};

const colors = {
  header: "#0f172a", accent: "#2563eb", light: "#f8fafc", border: "#e2e8f0",
  muted: "#64748b", success: "#16a34a", danger: "#dc2626", warning: "#d97706"
};

function getDomain(id){ return domains.find(d => d.id === id); }

function totalQuestions(){ return domains.reduce((a,d)=>a+d.questions.length,0); }
function correctCount(){ return Object.values(state.progress).filter(v=>v==="correct").length; }
function answeredCount(){ return Object.values(state.progress).length; }

function markAnswered(domainId, qIdx, correct){
  const key = `d${domainId}_q${qIdx}`;
  state.progress[key] = correct ? "correct" : "wrong";
}

function escapeHtml(str){
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function renderInlineBold(line){
  const escaped = escapeHtml(line);
  return escaped.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
}

// ============== AI-STYLE QUESTION GENERATOR (local, no network) ==============
function generateAiQuestion(domain){
  state.aiLoading = true;
  state.aiQuestion = null;
  state.aiSelected = null;
  state.aiShowExp = false;
  render();

  // Simulate a brief generation delay for a natural feel
  setTimeout(() => {
    const pool = extraQuestionPools[domain.id] || [];
    if (!state.aiUsedIndices[domain.id]) state.aiUsedIndices[domain.id] = new Set();
    const used = state.aiUsedIndices[domain.id];

    let available = pool.map((_, i) => i).filter(i => !used.has(i));
    if (available.length === 0) {
      used.clear();
      available = pool.map((_, i) => i);
    }

    if (available.length === 0) {
      state.aiQuestion = { error: true };
      state.aiLoading = false;
      render();
      return;
    }

    const pick = available[Math.floor(Math.random() * available.length)];
    used.add(pick);
    state.aiQuestion = pool[pick];
    state.aiLoading = false;
    render();
  }, 650);
}

function formatTime(totalSeconds){
  const h = Math.floor(totalSeconds / 3600);
  const m = Math.floor((totalSeconds % 3600) / 60);
  const s = totalSeconds % 60;
  const pad = (n) => String(n).padStart(2, "0");
  return h > 0 ? `${h}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
}

function renderTimerOnly(){
  const el = document.getElementById("mock-timer");
  if (el) {
    el.textContent = "⏱ " + formatTime(state.mockSecondsLeft);
    el.style.color = state.mockSecondsLeft <= 60 ? "#fca5a5" : "rgba(255,255,255,0.85)";
  }
  if (state.mockTimeUp) {
    render();
  }
}

// ============== MOCK EXAM ==============
function startMock(count){
  const n = count || 100;
  const all = [];
  domains.forEach(d => d.questions.forEach((q, i) => all.push({ ...q, domainId: d.id, qIdx: i, domainTitle: d.title })));
  const shuffled = all.sort(() => Math.random() - 0.5).slice(0, n);
  state.mockQuestions = shuffled;
  state.mockIndex = 0;
  state.mockAnswers = [];
  state.mockDone = false;
  state.mockSelected = null;
  state.mockTimeUp = false;
  state.view = "mock";

  // Real exam pace: 100 questions / 120 minutes = ~72 seconds/question
  state.mockSecondsLeft = Math.round(n * 72);
  if (state.mockTimerId) clearInterval(state.mockTimerId);
  state.mockTimerId = setInterval(() => {
    if (state.view !== "mock" || state.mockDone) {
      clearInterval(state.mockTimerId);
      return;
    }
    state.mockSecondsLeft -= 1;
    if (state.mockSecondsLeft <= 0) {
      state.mockSecondsLeft = 0;
      state.mockTimeUp = true;
      state.mockDone = true;
      clearInterval(state.mockTimerId);
    }
    renderTimerOnly();
  }, 1000);

  render();
}

  const app = document.getElementById("app");
  if (state.view === "mock") {
    app.innerHTML = renderMock();
  } else if (state.view === "domain" && state.activeDomainId) {
    app.innerHTML = renderDomain();
  } else {
    app.innerHTML = renderHome();
  }
  attachHandlers();
}

function renderDomainQuiz(d, qs){
  const q = qs[state.qIndex];
  const getOptionState = (i) => {
    if (state.selected === null) return "default";
    if (i === q.answer) return "correct";
    if (i === state.selected) return "wrong";
    return "disabled";
  };

  const dotsHtml = qs.map((_, i) => {
    const key = `d${d.id}_q${i}`;
    const p = state.progress[key];
    let cls = "dot";
    if (p === "correct") cls += " correct";
    else if (p === "wrong") cls += " wrong";
    if (i === state.qIndex) cls += " current";
    return `<button class="${cls}" data-action="goto-q" data-index="${i}"></button>`;
  }).join("");

  const optsHtml = q.options.map((opt, i) => {
    let cls = "option-btn";
    const st = state.selected !== null ? getOptionState(i) : "default";
    if (st === "correct") cls += " state-correct";
    else if (st === "wrong") cls += " state-wrong";
    else if (st === "disabled") cls += " state-disabled";
    return `<button class="${cls}" data-action="select-answer" data-index="${i}" ${state.selected !== null ? "disabled" : ""}>
      <span class="opt-letter">${String.fromCharCode(65+i)}.</span>${escapeHtml(opt)}
    </button>`;
  }).join("");

  return `
    ${renderDomainHeader(d)}
    <div class="content">
      <div class="quiz-top-row">
        <div class="quiz-counter">Question ${state.qIndex + 1} of ${qs.length}</div>
        <div class="dots-row">${dotsHtml}</div>
      </div>
      <div class="card">
        <div class="question-text">${escapeHtml(q.q)}</div>
        ${optsHtml}
        ${state.showExplanation ? `<div class="explanation-box"><strong>Explanation:</strong> ${escapeHtml(q.explanation)}</div>` : ``}
        <div class="quiz-nav-row">
          <button class="btn btn-ghost" data-action="prev-q" ${state.qIndex === 0 ? "disabled" : ""}>← Previous</button>

        </div>
      </div>
    </div>
  `;
}

        ${optsHtml}
        ${state.mockSelected !== null ? `
          <div class="explanation-box"><strong>Explanation:</strong> ${escapeHtml(mq.explanation)}</div>
          <div style="margin-top:16px;text-align:right">
            <button class="btn btn-primary" data-action="mock-next">${isLast ? "See Results →" : "Next Question →"}</button>
          </div>
        ` : ``}
      </div>
    </div>
  `;
}

function renderMockResults(){
  const score = state.mockAnswers.filter(a => a.correct).length;
  const answeredN = state.mockAnswers.length;
  const pct = Math.round((score / state.mockQuestions.length) * 100);
  const pass = pct >= 70;

  const reviewHtml = state.mockQuestions.map((q, i) => {
    const ans = state.mockAnswers[i];
    const unanswered = ans === undefined;
    return `
      <div class="card" style="border-color:${ans && ans.correct ? "#bbf7d0" : "#fecaca"}">
        <div class="review-row">
          <span class="badge" style="background:${ans && ans.correct ? colors.success : colors.danger}20;color:${ans && ans.correct ? colors.success : colors.danger}">${unanswered ? "⏱ Not Answered" : (ans.correct ? "✓ Correct" : "✗ Wrong")}</span>
          <span class="badge" style="background:${colors.muted}20;color:${colors.muted}">${escapeHtml(q.domainTitle)}</span>
        </div>
        <div class="review-q">Q${i+1}: ${escapeHtml(q.q)}</div>
        <div class="review-correct">✓ ${escapeHtml(q.options[q.answer])}</div>
        ${ans && !ans.correct ? `<div class="review-wrong">✗ You chose: ${escapeHtml(q.options[ans.chosen])}</div>` : ``}
        <div class="review-explain">${escapeHtml(q.explanation)}</div>
      </div>
    `;
  }).join("");

  return `
    <div class="header">
      <div class="header-title" style="font-size:18px">📝 Mock Exam Results</div>
      <div class="nav" style="margin-top:8px">
        <button class="nav-btn" data-action="go-home">← Back to Home</button>
      </div>
    </div>
    <div class="content">
      ${state.mockTimeUp ? `<div class="card" style="background:#fef3c7;border-color:#fde68a;color:#78350f;text-align:center;font-weight:600">⏱ Time's up! Your exam was automatically submitted with ${answeredN} of ${state.mockQuestions.length} questions answered.</div>` : ``}
      <div class="card result-card" style="border-color:${pass ? colors.success : colors.danger}">
        <div class="result-emoji">${pass ? "🎉" : "📚"}</div>
        <div class="result-pct" style="color:${pass ? colors.success : colors.danger}">${pct}%</div>
        <div class="result-status">${pass ? "PASS" : "NEEDS IMPROVEMENT"}</div>
        <div class="result-sub">${score} / ${state.mockQuestions.length} correct • Pass threshold: 70%</div>
        <div class="result-actions">
          <button class="btn btn-primary" data-action="start-mock">Retake Mock Exam</button>
          <button class="btn btn-ghost" data-action="go-home">Back to Study</button>
        </div>
      </div>
      <div class="section-title" style="margin-top:8px">Question Review</div>
      ${reviewHtml}
    </div>
  `;
}

// ============== EVENT HANDLING ==============
function attachHandlers(){
  document.querySelectorAll("[data-action]").forEach(el => {
    el.addEventListener("click", onAction);
  });
}

function onAction(e){
  const el = e.currentTarget;
  const action = el.dataset.action;
  const index = el.dataset.index !== undefined ? parseInt(el.dataset.index, 10) : null;

  switch(action){
    case "go-home":
      if (state.mockTimerId) { clearInterval(state.mockTimerId); state.mockTimerId = null; }
      state.view = "home";
      state.quizMode = false;
      state.selected = null;
      state.qIndex = 0;
      render();
      break;

    case "exit-mock": {
      if (confirm("Exit the exam? Your progress on this attempt will be lost.")) {
        if (state.mockTimerId) { clearInterval(state.mockTimerId); state.mockTimerId = null; }
        state.view = "home";
        render();
      }
      break;
    }

    case "start-mock":
      startMock(state.mockQuestions.length || 100);
      break;

    case "start-mock-full":
      startMock(100);
      break;

    case "start-mock-quick":
      startMock(20);
      break;

    case "reset-progress": {
      const total = Object.keys(state.progress).length;
      if (total > 0 && confirm("Reset all progress?")) {
        state.progress = {};
        render();
      }
      break;
    }

    case "open-domain": {
      const id = parseInt(el.dataset.id, 10);
      state.activeDomainId = id;
      state.view = "domain";
      state.activeTopic = 0;
      state.quizMode = false;
      state.qIndex = 0;
      state.selected = null;
      state.showExplanation = false;
      state.aiQuestion = null;
      state.aiSelected = null;
      render();
      break;
    }

    case "set-study-mode":
      state.quizMode = false;
      state.selected = null;
      render();
      break;

    case "set-quiz-mode":
      state.quizMode = true;
      state.qIndex = 0;
      state.selected = null;
      state.showExplanation = false;
      render();
      break;

    case "set-topic":
      state.activeTopic = index;
      render();
      break;

    case "generate-ai": {
      const d = getDomain(state.activeDomainId);
      generateAiQuestion(d);
      break;
    }

    case "ai-select":
      if (state.aiSelected === null) {
        state.aiSelected = index;
        state.aiShowExp = true;
        render();
      }
      break;

    case "select-answer": {
      if (state.selected !== null) break;
      const d = getDomain(state.activeDomainId);
      const q = d.questions[state.qIndex];
      state.selected = index;
      state.showExplanation = true;
      markAnswered(d.id, state.qIndex, index === q.answer);
      render();
      break;
    }

    case "goto-q":
      state.qIndex = index;
      state.selected = null;
      state.showExplanation = false;
      render();
      break;

    case "prev-q":
      state.qIndex = Math.max(0, state.qIndex - 1);
      state.selected = null;
      state.showExplanation = false;
      render();
      break;

    case "next-q": {
      const d = getDomain(state.activeDomainId);
      state.qIndex = Math.min(d.questions.length - 1, state.qIndex + 1);
      state.selected = null;
      state.showExplanation = false;
      render();
      break;
    }

    case "mock-select":
      if (state.mockSelected === null) {
        state.mockSelected = index;
        render();
      }
      break;

    case "mock-next": {
      const mq = state.mockQuestions[state.mockIndex];
      const correct = state.mockSelected === mq.answer;
      state.mockAnswers.push({ correct, chosen: state.mockSelected });
      if (state.mockIndex + 1 >= state.mockQuestions.length) {
        state.mockDone = true;
        if (state.mockTimerId) { clearInterval(state.mockTimerId); state.mockTimerId = null; }
      } else {
        state.mockIndex += 1;
        state.mockSelected = null;
      }
      render();
      break;
    }
  }
}

// ============== INIT ==============
render();
</script>
</body>
</html>
